<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sholo Guti (ষোল গুটি)</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="topbar">
    <button id="topbar-title-btn" class="topbar-title">Sholo Guti <span class="bn">ষোল গুটি</span></button>
    <nav class="topbar-nav">
      <button id="sound-toggle" class="nav-btn" data-i18n="soundOn">Sound: On</button>
      <select id="lang-select" class="lang-select" aria-label="Language">
        <option value="en">English</option>
        <option value="bn">বাংলা</option>
        <option value="ko">한국어</option>
      </select>
      <button id="new-game-btn" class="nav-btn" data-i18n="newGame">New Game</button>
    </nav>
  </header>

  <main id="app-root">

    <!-- HOME -->
    <section id="screen-home" class="screen">
      <div class="home-hero">
        <h1 data-i18n="appTitle">Sholo Guti</h1>
        <p class="home-tagline" data-i18n="homeTagline"></p>
      </div>
      <div class="home-grid">
        <button id="card-tutorial" class="home-card">
          <h2 data-i18n="homeTutorialTitle"></h2>
          <p data-i18n="homeTutorialDesc"></p>
        </button>
        <button id="card-local" class="home-card">
          <h2 data-i18n="homeLocalTitle"></h2>
          <p data-i18n="homeLocalDesc"></p>
        </button>
        <button id="card-ai" class="home-card">
          <h2 data-i18n="homeAiTitle"></h2>
          <p data-i18n="homeAiDesc"></p>
        </button>
        <button id="card-chardesign" class="home-card">
          <h2 data-i18n="homeCharTitle"></h2>
          <p data-i18n="homeCharDesc"></p>
        </button>
      </div>
    </section>

    <!-- TUTORIAL -->
    <section id="screen-tutorial" class="screen hidden">
      <div class="subscreen-header">
        <h2 data-i18n="homeTutorialTitle"></h2>
        <button class="link-btn back-home-link" data-i18n="backToHome"></button>
      </div>
      <div class="tutorial-content">
        <div class="tutorial-step-label" id="tutorial-step-label"></div>
        <div class="tutorial-progress" id="tutorial-progress"></div>

        <div class="tutorial-step" data-step="0">
          <p class="tutorial-intro" data-i18n="tutorialIntro"></p>
          <h3 data-i18n="tutorialSetupTitle"></h3>
          <p data-i18n="tutorialSetupBody"></p>
        </div>

        <div class="tutorial-step hidden" data-step="1">
          <h3 data-i18n="tutorialMoveTitle"></h3>
          <p data-i18n="tutorialMoveBody"></p>
        </div>

        <div class="tutorial-step hidden" data-step="2">
          <h3 data-i18n="tutorialCaptureTitle"></h3>
          <p data-i18n="tutorialCaptureBody"></p>
          <div class="tutorial-note">
            <span class="tutorial-note-icon" aria-hidden="true">🎲</span>
            <p data-i18n="tutorialHouseRuleNote"></p>
          </div>
        </div>

        <div class="tutorial-step hidden" data-step="3">
          <h3 data-i18n="tutorialChainTitle"></h3>
          <p data-i18n="tutorialChainBody"></p>
        </div>

        <div class="tutorial-step hidden" data-step="4">
          <h3 data-i18n="tutorialWinTitle"></h3>
          <p data-i18n="tutorialWinBody"></p>
        </div>

        <div class="tutorial-step hidden" data-step="5">
          <h3 data-i18n="tutorialRecapTitle"></h3>
          <p data-i18n="tutorialRecapBody"></p>
          <div class="tutorial-checklist" id="tutorial-checklist"></div>
          <div class="tutorial-play-row">
            <button id="tutorial-play-local-btn" class="start-match-btn" data-i18n="tutorialPlayLocal"></button>
            <button id="tutorial-play-ai-btn" class="start-match-btn" data-i18n="tutorialPlayAI"></button>
          </div>
        </div>

        <div class="tutorial-legend hidden" id="tutorial-legend">
          <div class="legend-item"><span class="legend-swatch legend-capture"></span><span data-i18n="legendCanCapture"></span></div>
          <div class="legend-item"><span class="legend-swatch legend-dest"></span><span data-i18n="legendLegalDest"></span></div>
          <div class="legend-item"><span class="legend-swatch legend-selected"></span><span data-i18n="legendSelected"></span></div>
        </div>

        <p class="tutorial-caption hidden" id="tutorial-stalemate-caption" data-i18n="tutorialStalemateCaption"></p>
        <div id="tutorial-practice-msg" style="text-align:center; min-height:1.4em; font-weight:700; color: var(--gold);"></div>
        <div id="tutorial-board-container" class="tutorial-practice-board"></div>

        <div class="tutorial-controls">
          <button id="tutorial-prev-btn" class="choice-btn hidden" data-i18n="tutorialPrev"></button>
          <button id="tutorial-reset-btn" class="choice-btn hidden" data-i18n="resetPractice"></button>
          <button id="tutorial-next-btn" class="choice-btn" data-i18n="tutorialNext"></button>
        </div>
      </div>
    </section>

    <!-- LOCAL PLAY -->
    <section id="screen-local" class="screen hidden">
      <div class="subscreen-header">
        <h2 data-i18n="homeLocalTitle"></h2>
        <button class="link-btn back-home-link" data-i18n="backToHome"></button>
      </div>
      <div class="end-turn-row">
        <button id="local-end-turn-btn" class="choice-btn hidden" data-i18n="endTurn"></button>
      </div>
      <div class="board-stage">
        <div class="board-row">
          <div class="tracker-side tracker-side-red">
            <div class="tracker-head"><span class="tracker-dot dot-red"></span><span data-i18n="red"></span></div>
            <div id="local-beads-red" class="tracker-beads bead-row-red" data-i18n-attr="aria-label:remainingLabel"></div>
            <div class="tracker-caption">
              <span class="tracker-pot-icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8 L7.5 19 a2 2 0 0 0 2 1.7h5a2 2 0 0 0 2-1.7L18 8"/><path d="M4 8 h16"/><path d="M9 8 V6 a3 3 0 0 1 6 0 v2"/></svg></span>
              <span data-i18n="capturedLabel"></span>: <span id="local-captured-red" class="tracker-captured-num">0</span>
            </div>
          </div>
          <div id="local-board-container" class="board-container"></div>
          <div class="tracker-side tracker-side-green">
            <div class="tracker-head"><span class="tracker-dot dot-green"></span><span data-i18n="green"></span></div>
            <div id="local-beads-green" class="tracker-beads bead-row-green" data-i18n-attr="aria-label:remainingLabel"></div>
            <div class="tracker-caption">
              <span class="tracker-pot-icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8 L7.5 19 a2 2 0 0 0 2 1.7h5a2 2 0 0 0 2-1.7L18 8"/><path d="M4 8 h16"/><path d="M9 8 V6 a3 3 0 0 1 6 0 v2"/></svg></span>
              <span data-i18n="capturedLabel"></span>: <span id="local-captured-green" class="tracker-captured-num">0</span>
            </div>
          </div>
        </div>
        <div id="local-turn-popup" class="turn-popup"></div>
      </div>
      <div id="local-turn-status" class="turn-status"></div>
    </section>

    <!-- VS AI -->
    <section id="screen-vsai" class="screen hidden">
      <div class="subscreen-header">
        <h2 data-i18n="homeAiTitle"></h2>
        <button class="link-btn back-home-link" data-i18n="backToHome"></button>
      </div>

      <div id="ai-setup-panel" class="ai-setup">
        <div class="setup-group">
          <label data-i18n="aiDifficultyLabel"></label>
          <div id="ai-difficulty-group" class="choice-row">
            <button class="choice-btn" data-value="easy" data-i18n="aiEasy"></button>
            <button class="choice-btn active" data-value="medium" data-i18n="aiMedium"></button>
            <button class="choice-btn" data-value="hard" data-i18n="aiHard"></button>
          </div>
        </div>
        <div class="setup-group">
          <label data-i18n="aiYourSide"></label>
          <div id="ai-side-group" class="choice-row">
            <button class="choice-btn active" data-value="red" data-i18n="red"></button>
            <button class="choice-btn" data-value="green" data-i18n="green"></button>
          </div>
        </div>
        <button id="start-match-btn" class="start-match-btn" data-i18n="startMatch"></button>
      </div>

      <div id="ai-board-wrap" class="hidden">
        <div class="end-turn-row">
          <button id="ai-end-turn-btn" class="choice-btn hidden" data-i18n="endTurn"></button>
        </div>
        <div class="board-stage">
          <div class="board-row">
            <div class="tracker-side tracker-side-red">
              <div class="tracker-head"><span class="tracker-dot dot-red"></span><span data-i18n="red"></span></div>
              <div id="ai-beads-red" class="tracker-beads bead-row-red" data-i18n-attr="aria-label:remainingLabel"></div>
              <div class="tracker-caption">
                <span class="tracker-pot-icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8 L7.5 19 a2 2 0 0 0 2 1.7h5a2 2 0 0 0 2-1.7L18 8"/><path d="M4 8 h16"/><path d="M9 8 V6 a3 3 0 0 1 6 0 v2"/></svg></span>
                <span data-i18n="capturedLabel"></span>: <span id="ai-captured-red" class="tracker-captured-num">0</span>
              </div>
            </div>
            <div id="ai-board-container" class="board-container"></div>
            <div class="tracker-side tracker-side-green">
              <div class="tracker-head"><span class="tracker-dot dot-green"></span><span data-i18n="green"></span></div>
              <div id="ai-beads-green" class="tracker-beads bead-row-green" data-i18n-attr="aria-label:remainingLabel"></div>
              <div class="tracker-caption">
                <span class="tracker-pot-icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8 L7.5 19 a2 2 0 0 0 2 1.7h5a2 2 0 0 0 2-1.7L18 8"/><path d="M4 8 h16"/><path d="M9 8 V6 a3 3 0 0 1 6 0 v2"/></svg></span>
                <span data-i18n="capturedLabel"></span>: <span id="ai-captured-green" class="tracker-captured-num">0</span>
              </div>
            </div>
          </div>
          <div id="ai-turn-popup" class="turn-popup"></div>
        </div>
        <div id="ai-turn-status" class="turn-status"></div>
      </div>
    </section>

    <!-- CHARACTER DESIGN -->
    <section id="screen-chardesign" class="screen hidden">
      <div class="subscreen-header">
        <h2 data-i18n="homeCharTitle"></h2>
        <button class="link-btn back-home-link" data-i18n="backToHome"></button>
      </div>
      <div class="chardesign-content">
        <p data-i18n="charDesignBody"></p>
        <div class="skin-picker-row">
          <div class="skin-picker-col">
            <h3 data-i18n="charRedLabel"></h3>
            <div id="skin-picker-red" class="skin-options"></div>
          </div>
          <div class="skin-picker-col">
            <h3 data-i18n="charGreenLabel"></h3>
            <div id="skin-picker-green" class="skin-options"></div>
          </div>
        </div>
        <div class="chardesign-play-row">
          <button id="chardesign-play-btn" class="start-match-btn" data-i18n="applyAndPlay"></button>
          <button id="chardesign-play-ai-btn" class="start-match-btn" data-i18n="applyAndPlayAI"></button>
        </div>
      </div>
    </section>

  </main>

  <footer class="site-footer">Made by team 6, U222, U224, U202</footer>

  <!-- WIN / DRAW OVERLAY -->
  <div id="win-overlay" class="win-overlay hidden">
    <div class="win-card">
      <h2 id="win-message"></h2>
      <div>
        <button id="win-play-again-btn" class="choice-btn" data-i18n="playAgain"></button>
        <button id="win-home-btn" class="choice-btn" data-i18n="backToHome"></button>
      </div>
    </div>
  </div>

  <script src="js/board-data.js"></script>
  <script src="js/rules-engine.js"></script>
  <script src="js/game-state.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/board-render.js"></script>
  <script src="js/interaction.js"></script>
  <script src="js/tutorial-sandbox.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/confetti.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
